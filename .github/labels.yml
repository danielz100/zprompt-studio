# Declarative label set for zprompt-studio.
# Sync via github-label-sync action (configured in T20 workflow).
# After T3 push, run manually once or wait for CI in T20.

# ─── Type ──────────────────────────────────────────────────
- name: bug
  color: d73a4a
  description: Something isn't working
- name: enhancement
  color: a2eeef
  description: New feature or request
- name: documentation
  color: 0075ca
  description: Docs only
- name: refactor
  color: cfd3d7
  description: Internal restructuring, no behavior change
- name: performance
  color: fbca04
  description: Speed / memory / latency
- name: security
  color: b60205
  description: Security-related (do NOT include reports here)
- name: ci
  color: 1d76db
  description: CI/CD pipeline

# ─── Priority ──────────────────────────────────────────────
- name: critical
  color: b60205
  description: Drop everything
- name: high
  color: d93f0b
- name: medium
  color: fbca04
- name: low
  color: c5def5

